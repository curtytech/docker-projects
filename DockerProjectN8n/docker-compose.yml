version: "3.8"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-proxy
      - traefik.http.routers.n8n.rule=Host(`n8n.you.tec.br`)
      - traefik.http.routers.n8n.entrypoints=web,websecure
      - traefik.http.routers.n8n.tls.certresolver=letsencrypt
      - traefik.http.services.n8n.loadbalancer.server.port=5678
    environment:
      - N8N_HOST=n8n.you.tec.br
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.you.tec.br/
      - N8N_EDITOR_BASE_URL=https://n8n.you.tec.br
      - NODE_ENV=production
      - GENERIC_TIMEZONE=America/Sao_Paulo
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - traefik-proxy

volumes:
  n8n_data:

networks:
  traefik-proxy:
    external: true
